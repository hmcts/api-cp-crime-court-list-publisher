tasks.named('compileJava') {
  dependsOn(tasks.openApiGenerate)
}

openApiGenerate {
  inputSpec.set(layout.projectDirectory.file("src/main/resources/openapi/court-list-publisher.openapi.yml"))
  outputDir.set(layout.buildDirectory.dir("generated"))
  apiPackage.set("uk.gov.hmcts.cp.openapi.api")
  modelPackage.set("uk.gov.hmcts.cp.openapi.model")
  generatorName.set("spring")
  configOptions.set([
    dateLibrary                         : "java8",
    interfaceOnly                       : "true",
    useSpringBoot3                      : "true",
    useTags                             : "true",   // use tag for api name
    generatedConstructorWithRequiredArgs: "false",  // else conflicts with lombok AllArgsConstructor
    openApiNullable                     : "false",  // else generates classes JsonNullable imports
    additionalModelTypeAnnotations      : "@lombok.Builder;@lombok.AllArgsConstructor;@lombok.NoArgsConstructor",
  ])
}
